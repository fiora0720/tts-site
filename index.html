<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TTS 테스트</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:400px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

textarea{
width:100%;
height:120px;
margin-bottom:10px;
padding:10px;
font-size:16px;
border:none;
border-radius:5px;
}

select,input{
width:100%;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:5px;
margin-right:5px;
cursor:pointer;
}

.speak{
background:#4caf50;
color:white;
}

.stop{
background:#f44336;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>TTS 테스트</h2>

<textarea id="text">안녕하세요. 테스트입니다.</textarea>

<label>목소리</label>
<select id="voice"></select>

<label>속도</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>피치</label>
<input type="range" id="pitch" min="0" max="2" step="0.1" value="1">

<button class="speak" onclick="speak()">재생</button>
<button class="stop" onclick="stop()">정지</button>

</div>

<script>

let voices=[]

function loadVoices(){
voices=speechSynthesis.getVoices()
let select=document.getElementById("voice")
select.innerHTML=""

voices.forEach((voice,i)=>{
let option=document.createElement("option")
option.value=i
option.textContent=voice.name+" ("+voice.lang+")"
select.appendChild(option)
})
}

speechSynthesis.onvoiceschanged=loadVoices

function speak(){

let text=document.getElementById("text").value
let voiceIndex=document.getElementById("voice").value
let rate=document.getElementById("rate").value
let pitch=document.getElementById("pitch").value

let utter=new SpeechSynthesisUtterance(text)

utter.voice=voices[voiceIndex]
utter.rate=rate
utter.pitch=pitch

speechSynthesis.speak(utter)

}

function stop(){
speechSynthesis.cancel()
}

</script>

</body>
</html>
